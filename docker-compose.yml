services:
  watchtower:
    image: nickfedor/watchtower:latest
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always
    environment:
      WATCHTOWER_NOTIFICATIONS_HOSTNAME: gickup
      WATCHTOWER_POLL_INTERVAL: 3600

  backup:
    image: buddyspencer/gickup:latest
    container_name: gickup-backup
    hostname: gickup-backup
    restart: always
    stop_grace_period: 500s
    stop_signal: SIGINT
    volumes:
      - ${PWD}/conf.yml:/gickup/conf.yml:r # Change the path of your local config ${PWD} is your current directory (where the docker-compose.yml is located)
      - ${PWD}/auth:/root/.auth:r
      - ${PWD}/ssh:/root/.ssh
      - gickup_data:/data
    command: ["/gickup/conf.yml"] # Changes the path of the internal bound config
    environment:
      - TZ=Europe/London

volumes:
  gickup_data:
    name: gickup_data
    external: true
